version: '3.8'

services:

  # ── Tầng 3: Data Warehouse ────────────────────────────────────────────────
  postgres_db:
    image: postgres:15
    container_name: dss-postgres-db
    environment:
      POSTGRES_USER:     dss_user
      POSTGRES_PASSWORD: CHANGE_ME_PASSWORD
      POSTGRES_DB:       omnisense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dss_user -d omnisense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tầng 6: Message Broker ────────────────────────────────────────────────
  redis_cache:
    image: redis:7
    container_name: dss-redis-cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Tầng ETL: Bơm data vào PostgreSQL (chạy 1 lần rồi thoát) ─────────────
  etl_loader:
    build: .
    container_name: dss-etl-loader
    command: python etl_pipeline.py
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    # Không restart — chạy 1 lần là xong
    restart: "no"

  # ── Tầng ML: Train models bên trong Docker (đảm bảo đúng version) ─────────
  # Chỉ cần chạy 1 lần: docker-compose run --rm train_models
  train_models:
    build: .
    container_name: dss-train-models
    command: >
      sh -c "echo '🚀 Bắt đầu train models...' &&
             python train_xgboost.py &&
             python train_rf_churn.py &&
             python train_kmeans_seller.py &&
             echo '✅ Tất cả models đã được train xong!'"
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - .:/app
    restart: "no"
    profiles:
      - train  # Chỉ chạy khi gọi: docker-compose --profile train up train_models

  # ── Tầng 5: Monitor Agent (quét rủi ro ngầm, pub Redis) ──────────────────
  monitor_agent:
    build: .
    container_name: dss-monitor-agent
    command: python monitor_agent.py
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Tầng 7: Streamlit UI ─────────────────────────────────────────────────
  omnisense_ui:
    build: .
    container_name: dss-omnisense-ui
    ports:
      - "8501:8501"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./data:/app/data
      - .:/app
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: